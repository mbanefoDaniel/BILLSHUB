<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Nefotech</title>
    <meta name="description" content="Reset your Nefotech account password.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Nefotech</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="bills.html">Pay Bills</a></li>
                <li><a href="numbers.html">Virtual Numbers</a></li>
            </ul>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Forgot Password Form (no token) -->
                <div id="forgotSection">
                    <div class="auth-header">
                        <h2>Forgot Password</h2>
                        <p>Enter your email and we'll send you a reset link</p>
                    </div>
                    <form id="forgotForm" class="auth-form">
                        <div class="form-group">
                            <label for="forgotEmail">Email Address</label>
                            <div class="input-icon">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="forgotEmail" required placeholder="your@email.com" autocomplete="email">
                            </div>
                        </div>
                        <div id="forgotError" class="form-error" style="display:none;"></div>
                        <div id="forgotSuccess" class="form-success" style="display:none;"></div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block">
                            <i class="fas fa-paper-plane"></i> Send Reset Link
                        </button>
                    </form>
                    <div class="auth-footer">
                        <p>Remember your password? <a href="login.html">Sign In</a></p>
                    </div>
                </div>

                <!-- Reset Password Form (with token) -->
                <div id="resetSection" style="display:none;">
                    <div class="auth-header">
                        <h2>Reset Password</h2>
                        <p>Enter your new password</p>
                    </div>
                    <form id="resetForm" class="auth-form">
                        <div class="form-group">
                            <label for="resetPassword">New Password</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="resetPassword" required placeholder="Min 8 characters" minlength="8">
                                <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="resetConfirm">Confirm Password</label>
                            <div class="input-icon">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="resetConfirm" required placeholder="Re-enter password" minlength="8">
                            </div>
                        </div>
                        <div id="resetError" class="form-error" style="display:none;"></div>
                        <div id="resetSuccess" class="form-success" style="display:none;"></div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block">
                            <i class="fas fa-key"></i> Reset Password
                        </button>
                    </form>
                    <div class="auth-footer">
                        <p><a href="login.html">Back to Sign In</a></p>
                    </div>
                </div>
                <div class="auth-legal" style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted);">
                    <a href="terms.html" style="color:var(--text-muted);">Terms of Service</a> · <a href="privacy.html" style="color:var(--text-muted);">Privacy Policy</a>
                </div>
            </div>
        </div>
    </section>

    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            // Toggle password visibility
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = btn.parentElement.querySelector('input');
                    const icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });

            if (token) {
                // Show reset form
                document.getElementById('forgotSection').style.display = 'none';
                document.getElementById('resetSection').style.display = 'block';

                document.getElementById('resetForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const password = document.getElementById('resetPassword').value;
                    const confirm = document.getElementById('resetConfirm').value;
                    const errorEl = document.getElementById('resetError');
                    const successEl = document.getElementById('resetSuccess');
                    const btn = e.target.querySelector('button[type="submit"]');

                    errorEl.style.display = 'none';
                    successEl.style.display = 'none';

                    if (password !== confirm) {
                        errorEl.textContent = 'Passwords do not match';
                        errorEl.style.display = 'block';
                        return;
                    }

                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
                    btn.disabled = true;

                    try {
                        const res = await fetch('/api/auth/reset-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token, new_password: password })
                        });
                        const data = await res.json();

                        if (!res.ok) throw new Error(data.error);

                        successEl.textContent = data.message + ' Redirecting...';
                        successEl.style.display = 'block';
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } catch (err) {
                        errorEl.textContent = err.message;
                        errorEl.style.display = 'block';
                        btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                        btn.disabled = false;
                    }
                });
            } else {
                // Show forgot form
                document.getElementById('forgotForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('forgotEmail').value.trim();
                    const errorEl = document.getElementById('forgotError');
                    const successEl = document.getElementById('forgotSuccess');
                    const btn = e.target.querySelector('button[type="submit"]');

                    errorEl.style.display = 'none';
                    successEl.style.display = 'none';

                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                    btn.disabled = true;

                    try {
                        const res = await fetch('/api/auth/forgot-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email })
                        });
                        const data = await res.json();

                        if (!res.ok) throw new Error(data.error);

                        successEl.textContent = data.message;
                        successEl.style.display = 'block';
                        btn.innerHTML = '<i class="fas fa-check"></i> Sent!';
                    } catch (err) {
                        errorEl.textContent = err.message;
                        errorEl.style.display = 'block';
                        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                        btn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
