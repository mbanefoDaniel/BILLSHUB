<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Nefotech</title>
    <meta name="description" content="Create a free Nefotech account and get ₦5,000 welcome bonus. Pay bills and get virtual numbers.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Nefotech</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="bills.html">Pay Bills</a></li>
                <li><a href="numbers.html">Virtual Numbers</a></li>
            </ul>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join Nefotech and start paying bills & getting virtual numbers</p>
                </div>
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regName" required placeholder="John Doe" autocomplete="name" minlength="2">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" required placeholder="your@email.com" autocomplete="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">Phone Number</label>
                        <div class="input-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="regPhone" placeholder="+1 (555) 000-0000" autocomplete="tel">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" required placeholder="Min 6 characters" autocomplete="new-password" minlength="6">
                            <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"><div class="strength-fill"></div></div>
                            <span class="strength-text">Password strength</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirm">Confirm Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regConfirm" required placeholder="Re-enter password" autocomplete="new-password" minlength="6">
                            <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required> I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
                        </label>
                    </div>
                    <div id="registerError" class="form-error" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="auth-divider"><span>or sign up with</span></div>
                <div class="social-auth">
                    <button class="btn-social google" onclick="alert('Google sign-up coming soon!')"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social apple" onclick="alert('Apple sign-up coming soon!')"><i class="fab fa-apple"></i> Apple</button>
                </div>
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
